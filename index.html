<!DOCTYPE html>
<html lang="en">
<head>
   <!-- Makes it open without the browser URL bar (iOS) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My ToDo">

<!-- The Real App Icon (Upload your icon.png to GitHub) -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<!-- Sets the status bar color on Android -->
<meta name="theme-color" content="#1b8a7c">

</head>
<body>
    <div class="app-card">
        <h1>📝 My To-Do List</h1>
        
        <input type="text" id="task-input" placeholder="Enter a task...">
        <button id="add-btn">+ Add Task</button>

        <ul id="task-list">
            <!-- Tasks will appear here -->
        </ul>

        <div class="actions">
            <button id="complete-selected" class="btn-blue">✓ Complete</button>
            <button id="delete-selected" class="btn-red">🗑 Delete</button>
        </div>

        <div class="stats">
            <span>Total: <b id="total-count">0</b></span>
            <span>Completed: <b id="comp-count">0</b></span>
            <span>Incomplete: <b id="incomp-count">0</b></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
