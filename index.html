<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    <meta charset="UTF-8">
    <title>Advanced To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <h1>📝 My To-Do List</h1>
        
        <input type="text" id="task-input" placeholder="Enter a task...">
        <button id="add-btn">+ Add Task</button>

        <ul id="task-list">
            <!-- Tasks will appear here -->
        </ul>

        <div class="actions">
            <button id="complete-selected" class="btn-blue">✓ Complete</button>
            <button id="delete-selected" class="btn-red">🗑 Delete</button>
        </div>

        <div class="stats">
            <span>Total: <b id="total-count">0</b></span>
            <span>Completed: <b id="comp-count">0</b></span>
            <span>Incomplete: <b id="incomp-count">0</b></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
